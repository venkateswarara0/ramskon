<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ramskon</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <div class="brand">
                <div class="brand-badge">A</div>
                <div>
                    <h1>Admin Dashboard</h1>
                    <p>Welcome, {{ name }}</p>
                </div>
            </div>

            <div class="top-actions">
                <a class="btn btn-outline" href="{{ url_for('admin.pending_requests') }}">Pending Requests</a>
                <a class="btn btn-outline" href="{{ url_for('admin.submission_reviews') }}">Submission Reviews</a>
                <a class="btn" href="{{ url_for('auth.logout') }}">Logout</a>
            </div>
        </div>

        <div class="grid-4">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="stat-value">{{ total_users }}</div>
            </div>
            <div class="stat-card">
                <h3>Pending Requests</h3>
                <div class="stat-value">{{ pending_requests }}</div>
            </div>
            <div class="stat-card">
                <h3>Approved Requests</h3>
                <div class="stat-value">{{ approved_requests }}</div>
            </div>
            <div class="stat-card">
                <h3>Completed Topics</h3>
                <div class="stat-value">{{ completed_topics }}</div>
            </div>
        </div>
    </div>
</body>
</html>
